name: nexus-financial-twin

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nexus-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro
    depends_on:
      - backend
      - frontend
    networks:
      - nexus

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: nexus-backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-nexus}
      DB_USERNAME: ${DB_USERNAME:-nexus}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus

  queue:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: nexus-queue
    command: php artisan queue:work redis --sleep=1 --tries=3 --max-time=3600
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_DATABASE: ${DB_DATABASE:-nexus}
      DB_USERNAME: ${DB_USERNAME:-nexus}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus

  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: nexus-scheduler
    command: php artisan schedule:work
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_DATABASE: ${DB_DATABASE:-nexus}
      DB_USERNAME: ${DB_USERNAME:-nexus}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: nexus-frontend
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    networks:
      - nexus

  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nexus}
      POSTGRES_USER: ${DB_USERNAME:-nexus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nexus} -d ${DB_DATABASE:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nexus

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nexus

volumes:
  pgdata:
  redisdata:

networks:
  nexus:
    driver: bridge
